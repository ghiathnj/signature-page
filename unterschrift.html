<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unterschrift</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f8f6;
    --white: #ffffff;
    --ink: #111111;
    --border: #d8d8d4;
    --muted: #999;
    --btn-confirm: #111111;
    --btn-clear: #ffffff;
    --radius: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
  }

  /* ── PAGES ── */
  .page {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .page.active { display: flex; }

  /* ── SIGN PAGE ── */
  .sign-wrapper {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .sign-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-left: 2px;
  }

  /* Canvas container */
  .canvas-container {
    position: relative;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }

  canvas {
    display: block;
    width: 100%;
    height: min(55vh, 380px);
    cursor: crosshair;
    touch-action: none;
  }

  /* Hint text */
  .canvas-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .canvas-hint span {
    font-size: 1rem;
    font-weight: 300;
    color: #ccc;
    letter-spacing: 0.04em;
  }

  .canvas-hint.hidden { opacity: 0; }

  /* Baseline */
  .canvas-baseline {
    position: absolute;
    bottom: 56px;
    left: 5%;
    right: 5%;
    height: 1px;
    background: #e8e8e4;
    pointer-events: none;
  }

  /* ── BUTTONS ── */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 0.75rem;
    margin-top: 1.25rem;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 1rem 1.5rem;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.98); }

  .btn-clear {
    background: var(--btn-clear);
    color: var(--ink);
  }

  .btn-clear:hover {
    background: #f0f0ee;
    border-color: #bbb;
  }

  .btn-confirm {
    background: var(--btn-confirm);
    color: #ffffff;
    border-color: var(--btn-confirm);
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .btn-confirm:hover {
    background: #2a2a2a;
    box-shadow: 0 4px 18px rgba(0,0,0,0.22);
  }

  .btn-confirm:disabled {
    background: #ccc;
    border-color: #ccc;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* ── THANK YOU PAGE ── */
  .thankyou-wrapper {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .check-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .check-circle svg { width: 34px; height: 34px; }

  .thankyou-title {
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--ink);
  }

  .thankyou-sub {
    font-size: 1rem;
    font-weight: 300;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.6;
  }

  .sig-preview {
    margin-top: 0.5rem;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 2rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }

  .sig-preview img {
    max-height: 90px;
    display: block;
  }

  .sig-preview-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #bbb;
    text-align: center;
    margin-top: 0.6rem;
  }

  @media (max-width: 480px) {
    .thankyou-title { font-size: 1.4rem; }
    canvas { height: min(50vh, 280px); }
    .btn { font-size: 0.95rem; padding: 0.9rem 1rem; }
  }
</style>
</head>
<body>

<!-- ── SIGN PAGE ── -->
<div class="page active" id="pageSign">
  <div class="sign-wrapper">
    <div class="sign-label">Ihre Unterschrift</div>
    <div class="canvas-container" id="canvasContainer">
      <canvas id="sigCanvas"></canvas>
      <div class="canvas-baseline"></div>
      <div class="canvas-hint" id="canvasHint">
        <span>Hier unterschreiben …</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-clear" onclick="clearCanvas()">Löschen</button>
      <button class="btn btn-confirm" id="btnConfirm" onclick="confirm()" disabled>Bestätigen</button>
    </div>
  </div>
</div>

<!-- ── THANK YOU PAGE ── -->
<div class="page" id="pageThank">
  <div class="thankyou-wrapper">
    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div>
      <div class="thankyou-title">Vielen Dank!</div>
    </div>
    <div class="thankyou-sub">Ihre Unterschrift wurde erfolgreich gespeichert.</div>
    <div class="sig-preview">
      <img id="sigPreview" src="" alt="Ihre Unterschrift">
      <div class="sig-preview-label">Gespeicherte Unterschrift</div>
    </div>
  </div>
</div>

<script>
  // ── Canvas init ──
  const canvas  = document.getElementById('sigCanvas');
  const ctx     = canvas.getContext('2d');
  const hint    = document.getElementById('canvasHint');
  const btnConf = document.getElementById('btnConfirm');

  let drawing = false;
  let hasMark = false;
  let dpr     = window.devicePixelRatio || 1;

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    // Preserve drawing
    const snap = hasMark ? canvas.toDataURL() : null;
    canvas.width  = rect.width  * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    setupCtx();
    if (snap) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
      img.src = snap;
    }
  }

  function setupCtx() {
    ctx.strokeStyle = '#111111';
    ctx.lineWidth   = 2.4;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ── Pointer helpers ──
  function getXY(e) {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  function onStart(e) {
    e.preventDefault();
    drawing = true;
    const { x, y } = getXY(e);
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function onMove(e) {
    if (!drawing) return;
    e.preventDefault();
    const { x, y } = getXY(e);
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
    if (!hasMark) {
      hasMark = true;
      hint.classList.add('hidden');
      btnConf.disabled = false;
    }
  }

  function onEnd() { drawing = false; }

  canvas.addEventListener('mousedown',  onStart);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onEnd);
  canvas.addEventListener('mouseleave', onEnd);
  canvas.addEventListener('touchstart', onStart, { passive: false });
  canvas.addEventListener('touchmove',  onMove,  { passive: false });
  canvas.addEventListener('touchend',   onEnd);

  // ── Clear ──
  function clearCanvas() {
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    hasMark = false;
    hint.classList.remove('hidden');
    btnConf.disabled = true;
  }

  // ── Confirm: export transparent PNG, show thank-you ──
  function confirm() {
    if (!hasMark) return;

    // Crop to bounding box of actual ink pixels
    const cropped = getCroppedCanvas();

    document.getElementById('sigPreview').src = cropped;

    // Switch pages
    document.getElementById('pageSign').classList.remove('active');
    document.getElementById('pageThank').classList.add('active');
  }

  function getCroppedCanvas() {
    const w = canvas.width;
    const h = canvas.height;
    const data = ctx.getImageData(0, 0, w, h).data;

    let minX = w, minY = h, maxX = 0, maxY = 0;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const alpha = data[(y * w + x) * 4 + 3];
        if (alpha > 10) {
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }
    }

    const pad = 20 * dpr;
    minX = Math.max(0, minX - pad);
    minY = Math.max(0, minY - pad);
    maxX = Math.min(w, maxX + pad);
    maxY = Math.min(h, maxY + pad);

    const cw = maxX - minX;
    const ch = maxY - minY;

    const offscreen = document.createElement('canvas');
    offscreen.width  = cw;
    offscreen.height = ch;
    const octx = offscreen.getContext('2d');
    octx.drawImage(canvas, minX, minY, cw, ch, 0, 0, cw, ch);

    return offscreen.toDataURL('image/png');
  }
</script>
</body>
</html>
